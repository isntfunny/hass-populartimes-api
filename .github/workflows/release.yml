name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate manifest version against tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          MANIFEST_VERSION=$(python3 -c 'import json; print(json.load(open("custom_components/populartimes/manifest.json", encoding="utf-8"))["version"])')
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          python3 scripts/extract_release_notes.py "${{ steps.tag.outputs.tag }}" CHANGELOG.md RELEASE_NOTES.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.tag.outputs.tag }}" \
              --title "${{ steps.tag.outputs.tag }}" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "${{ steps.tag.outputs.tag }}" \
              --title "${{ steps.tag.outputs.tag }}" \
              --notes-file RELEASE_NOTES.md
          fi
